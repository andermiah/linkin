<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>linkin — one link. all the tabs.</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand-bg:        #060606;
      --brand-fg:        #F0EEE8;
      --brand-fg-2:      rgba(240,238,232,0.45);
      --acid:            #C6FF4E;
      --tool-bg:         #F4F2EC;
      --tool-fg:         #111110;
      --tool-fg-2:       #6B6A65;
      --tool-fg-3:       #A8A7A2;
      --tool-border:     #E0DED7;
      --tool-border-mid: #CCCAC2;
      --tool-surface:    rgba(255,255,255,0.72);
      --mono:    'DM Mono', 'Courier New', monospace;
      --sans:    'DM Sans', system-ui, sans-serif;
      --display: 'Bebas Neue', 'Arial Black', sans-serif;
      --radius: 8px;
    }

    html { height: 100%; overscroll-behavior: none; }
    body {
      font-family: var(--sans);
      font-size: 0.875rem;
      line-height: 1.6;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ══════════════════════════════════════
       BRAND PANEL — fixed left
    ══════════════════════════════════════ */
    .brand {
      position: fixed;
      top: 0; left: 0;
      width: 42%;
      height: 100vh;
      background: var(--brand-bg);
      display: flex;
      flex-direction: column;
      padding: 3rem 2.5rem;
      overflow: hidden;
    }

    /* ── Decorative bubbles ── */
    .bubble {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .b1 { width: 550px; height: 550px; top: -180px;   left: -180px;    background: radial-gradient(circle, oklch(60% 0.20 280  / 0.20) 0%, transparent 70%); filter: blur(50px); }
    .b2 { width: 480px; height: 480px; top: -100px;   right: -160px;  background: radial-gradient(circle, oklch(82% 0.22 135  / 0.16) 0%, transparent 70%); filter: blur(50px); }
    .b3 { width: 420px; height: 420px; top: 25%;      left: -120px;   background: radial-gradient(circle, oklch(62% 0.22 310  / 0.15) 0%, transparent 70%); filter: blur(55px); }
    .b4 { width: 360px; height: 360px; top: 30%;      right: -80px;   background: radial-gradient(circle, oklch(75% 0.18 55   / 0.16) 0%, transparent 70%); filter: blur(45px); }
    .b5 { width: 500px; height: 500px; top: 50%;      left: -100px;   background: radial-gradient(circle, oklch(58% 0.18 220  / 0.16) 0%, transparent 70%); filter: blur(55px); }
    .b6 { width: 440px; height: 440px; bottom: -140px; right: -120px; background: radial-gradient(circle, oklch(82% 0.22 135  / 0.18) 0%, transparent 70%); filter: blur(50px); }
    .b7 { width: 300px; height: 300px; bottom: 10%;   left: 20%;      background: radial-gradient(circle, oklch(78% 0.20 75   / 0.14) 0%, transparent 70%); filter: blur(40px); }
    .b8 { width: 250px; height: 250px; top: 55%;      right: 5%;      background: radial-gradient(circle, oklch(82% 0.22 135  / 0.12) 0%, transparent 70%); filter: blur(35px); }

    .brand-top { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 1; }

    .brand-tag {
      font-family: var(--mono);
      font-size: 0.625rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--acid);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-tag::before { content: ''; display: block; width: 20px; height: 1px; background: var(--acid); }

    .brand-logo {
      font-family: var(--display);
      font-size: clamp(5rem, 11vw, 8.5rem);
      line-height: 0.9;
      color: var(--brand-fg);
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
    }
    .brand-logo span { color: var(--acid); display: block; }

    .brand-desc {
      font-size: 0.875rem;
      line-height: 1.75;
      color: var(--brand-fg-2);
      max-width: 280px;
    }

    .brand-divider { width: 32px; height: 2px; background: var(--acid); opacity: 0.4; margin-block: 2rem; }

    .brand-meta {
      font-family: var(--mono);
      font-size: 0.625rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand-fg-2);
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }
    .brand-meta span { display: flex; align-items: center; gap: 8px; }
    .brand-meta span::before { content: '○'; font-size: 0.5rem; color: var(--acid); }

    .brand-bottom {
      padding-top: 2rem;
      border-top: 1px solid rgba(240,238,232,0.1);
      position: relative;
      z-index: 1;
    }

    /* Coffee link — exact original animations */
    .coffee-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.625rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand-fg-2);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s ease, transform 0.2s ease;
      padding-block: 0.25rem;
    }
    .coffee-link:hover { color: var(--acid); transform: translateY(-1px); }
    .coffee-link:hover .coffee-icon { transform: translateZ(0) rotate(-15deg) scale(1.1); }
    .coffee-icon { display: inline-block; transition: transform 0.3s ease; transform: translateZ(0); will-change: transform; }

    /* ══════════════════════════════════════
       TOOL PANEL — right, natural scroll
    ══════════════════════════════════════ */
    .tool {
      margin-left: 42%;
      min-height: 100vh;
      background: var(--tool-bg);
      display: flex;
      flex-direction: column;
    }

    .tool-inner {
      flex: 1;
      padding: 4rem 3rem 5rem;
      max-width: 520px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 0.625rem;
      font-weight: 500;
      color: var(--tool-fg-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .eyebrow-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--tool-fg); flex-shrink: 0; }

    h1 {
      font-family: var(--display);
      font-size: clamp(2.5rem, 4vw, 3.75rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
      color: var(--tool-fg);
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.9375rem;
      color: var(--tool-fg-2);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      max-width: 400px;
    }

    .field-label {
      display: block;
      font-family: var(--mono);
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--tool-fg-3);
      margin-bottom: 0.625rem;
    }

    textarea {
      width: 100%;
      background: var(--tool-surface);
      border: 1px solid var(--tool-border-mid);
      border-radius: var(--radius);
      color: var(--tool-fg);
      font-family: var(--mono);
      font-size: 0.8125rem;
      line-height: 1.85;
      padding: 14px 16px;
      resize: none;
      min-height: 152px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    textarea::placeholder { color: var(--tool-fg-3); }
    textarea:focus {
      border-color: var(--tool-fg);
      box-shadow: 0 0 0 3px rgba(17,17,16,0.07);
    }

    .field-hint {
      font-family: var(--mono);
      font-size: 0.5625rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--tool-fg-3);
      margin-top: 0.625rem;
    }

    .error {
      font-family: var(--mono);
      font-size: 0.6875rem;
      color: #b91c1c;
      margin-top: 0.5rem;
      display: none;
    }

    .btn-row { margin-top: 1.5rem; display: flex; gap: 0.625rem; }

    button.primary {
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: var(--radius);
      border: 1.5px solid var(--tool-fg);
      cursor: pointer;
      background: var(--tool-fg);
      color: var(--tool-bg);
      transition: background 0.15s, transform 0.12s;
      letter-spacing: 0.01em;
    }
    button.primary:hover { background: #2a2a28; }
    button.primary:active { transform: scale(0.97); }

    button.outline {
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 11px 18px;
      border-radius: var(--radius);
      border: 1.5px solid var(--tool-border-mid);
      cursor: pointer;
      background: transparent;
      color: var(--tool-fg-2);
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.01em;
    }
    button.outline:hover { border-color: var(--tool-fg); color: var(--tool-fg); }

    button.full {
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      margin-top: 1.5rem;
      padding: 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--tool-fg);
      cursor: pointer;
      background: var(--tool-fg);
      color: var(--tool-bg);
      transition: background 0.15s, transform 0.12s;
    }
    button.full:hover { background: #2a2a28; }
    button.full:active { transform: scale(0.98); }

    .output {
      margin-top: 2rem;
      border: 1px solid var(--tool-border);
      border-radius: var(--radius);
      background: var(--tool-surface);
      overflow: hidden;
      display: none;
    }

    .output-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--tool-border);
      font-family: var(--mono);
      font-size: 0.5625rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--tool-fg-3);
    }

    .share-url-wrap { padding: 16px; }
    .share-url { font-family: var(--mono); font-size: 0.75rem; word-break: break-all; color: var(--tool-fg); line-height: 1.8; }

    .output-actions { padding: 10px 14px; border-top: 1px solid var(--tool-border); display: flex; align-items: center; gap: 10px; }

    #copied { font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tool-fg); display: none; }

    /* Recipient */
    .bundle-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }

    .bundle-count {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--tool-fg);
      background: rgba(17,17,16,0.07);
      border: 1px solid var(--tool-border-mid);
      border-radius: 4px;
      padding: 4px 10px;
    }

    .bundle-label { font-size: 0.75rem; color: var(--tool-fg-3); }

    .url-list { list-style: none; border: 1px solid var(--tool-border); border-radius: var(--radius); overflow: hidden; background: var(--tool-surface); }

    .url-list li { display: flex; border-bottom: 1px solid var(--tool-border); transition: background 0.12s; }
    .url-list li:last-child { border-bottom: none; }
    .url-list li:hover { background: rgba(17,17,16,0.04); }

    .url-index { padding: 12px 14px; border-right: 1px solid var(--tool-border); font-family: var(--mono); font-size: 0.625rem; color: var(--tool-fg-3); min-width: 42px; text-align: center; flex-shrink: 0; }
    .url-text { padding: 12px 16px; font-family: var(--mono); font-size: 0.75rem; color: var(--tool-fg-2); word-break: break-all; line-height: 1.7; }

    .popup-warn { display: none; margin-top: 12px; padding: 12px 14px; background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius); font-size: 0.75rem; color: #b91c1c; line-height: 1.6; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .brand { position: relative; width: 100%; height: auto; }
      .brand-logo { font-size: 4.5rem; }
      .brand-divider, .brand-meta { display: none; }
      .tool { margin-left: 0; }
      .tool-inner { padding: 2.5rem 1.5rem 4rem; }
    }

    :focus-visible { outline: 2px solid var(--tool-fg); outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- ── Brand Panel ── -->
  <aside class="brand">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
    <div class="bubble b6"></div>
    <div class="bubble b7"></div>
    <div class="bubble b8"></div>

    <div class="brand-top">
      <p class="brand-tag">link bundler</p>
      <h2 class="brand-logo">Link<span>in</span></h2>
      <p class="brand-desc">Bundle multiple URLs into one shareable link. Paste, generate, share — anyone who opens it launches all the tabs at once.</p>
      <div class="brand-divider"></div>
      <div class="brand-meta">
        <span>No account required</span>
        <span>No server. No tracking.</span>
        <span>Works entirely in your browser</span>
      </div>
    </div>

    <div class="brand-bottom">
      <a class="coffee-link" href="https://buymeacoffee.com/andermiah" target="_blank" rel="noopener noreferrer">
        <svg class="coffee-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
          <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
          <line x1="6" x2="6" y1="2" y2="4"/>
          <line x1="10" x2="10" y1="2" y2="4"/>
          <line x1="14" x2="14" y1="2" y2="4"/>
        </svg>
        buy me a coffee
      </a>
    </div>
  </aside>

  <!-- ── Tool Panel ── -->
  <main class="tool">
    <div class="tool-inner">
      <div id="app"></div>
    </div>
  </main>

  <script>
    const app = document.getElementById('app');
    const hash = window.location.hash.slice(1);

    function isValidUrl(str) {
      try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
      catch { return false; }
    }

    if (hash) {
      // ── Recipient view ──
      let urls = [];
      try { urls = JSON.parse(atob(hash)); } catch {}
      urls = urls.filter(isValidUrl);

      app.innerHTML = `
        <div class="eyebrow"><div class="eyebrow-dot"></div>Bundle received</div>
        <h1>You've got<br>${urls.length} tab${urls.length !== 1 ? 's' : ''}.</h1>
        <p class="subtitle">Review the links below before opening. One click opens all of them.</p>
        <div class="bundle-meta">
          <span class="bundle-count">${urls.length} link${urls.length !== 1 ? 's' : ''}</span>
          <span class="bundle-label">in this bundle</span>
        </div>
        <ul class="url-list">
          ${urls.map((u, i) => `
            <li>
              <span class="url-index">${String(i + 1).padStart(2, '0')}</span>
              <span class="url-text">${u}</span>
            </li>
          `).join('')}
        </ul>
        <button class="full" onclick="openTabs()">Open all ${urls.length} tab${urls.length !== 1 ? 's' : ''} &rarr;</button>
        <div class="popup-warn" id="popup-warn">
          Your browser blocked the popups. Allow popups for this site, then click the button again.
        </div>
      `;

      window.openTabs = () => {
        const btn = event.currentTarget;
        btn.textContent = 'Opening…';
        const blocked = urls.map(u => window.open(u, '_blank')).some(w => !w);
        setTimeout(() => { btn.textContent = `Open all ${urls.length} tab${urls.length !== 1 ? 's' : ''} →`; }, 1200);
        if (blocked) document.getElementById('popup-warn').style.display = 'block';
      };

    } else {
      // ── Creator view ──
      app.innerHTML = `
        <div class="eyebrow"><div class="eyebrow-dot"></div>Create a bundle</div>
        <h1>Bundle.<br>Share.<br>Launch.</h1>
        <p class="subtitle">Add your URLs below — get a single shareable link. Anyone who opens it launches all the tabs at once.</p>
        <label class="field-label" for="urlInput">Your URLs — one per line</label>
        <textarea id="urlInput" placeholder="https://example.com&#10;https://another.com&#10;https://onemore.com" spellcheck="false"></textarea>
        <p class="field-hint">https:// and http:// links only</p>
        <div class="error" id="err">No valid URLs found. Make sure each starts with https:// or http://</div>
        <div class="btn-row">
          <button class="primary" onclick="generate()">Generate share link</button>
        </div>
        <div class="output" id="shareOutput">
          <div class="output-header">Your share link</div>
          <div class="share-url-wrap">
            <div class="share-url" id="shareUrl"></div>
          </div>
          <div class="output-actions">
            <button class="outline" onclick="copyUrl()">Copy link</button>
            <span id="copied">Copied</span>
          </div>
        </div>
      `;

      window.generate = () => {
        const urls = document.getElementById('urlInput').value
          .split('\n').map(u => u.trim()).filter(isValidUrl);
        const err = document.getElementById('err');
        if (urls.length === 0) { err.style.display = 'block'; return; }
        err.style.display = 'none';
        const encoded = btoa(JSON.stringify(urls));
        document.getElementById('shareUrl').textContent = `${location.origin}${location.pathname}#${encoded}`;
        document.getElementById('shareOutput').style.display = 'block';
        const btn = event.currentTarget;
        const orig = btn.textContent;
        btn.textContent = '✓ Link ready';
        setTimeout(() => btn.textContent = orig, 1800);
      };

      window.copyUrl = () => {
        navigator.clipboard.writeText(document.getElementById('shareUrl').textContent);
        const btn = event.currentTarget;
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        setTimeout(() => { btn.textContent = orig; }, 1800);
      };
    }
  </script>
</body>
</html>
