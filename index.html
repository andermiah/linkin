<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>linkin — one link. all the tabs.</title>
  <meta name="theme-color" content="#F5F4F0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Pick a random bg color before first paint — no FOUC -->
  <script>
    const palettes = [
      { oklch: 'oklch(96.7% 0.0053 95.3)',  hex: '#F5F4F0' }, // warm cream
      { oklch: 'oklch(95.8% 0.0101 145.9)', hex: '#EDF3ED' }, // sage
      { oklch: 'oklch(93.9% 0.0173 308.1)', hex: '#EEE8F4' }, // lavender
      { oklch: 'oklch(94.9% 0.0130 71.3)',  hex: '#F4EDE5' }, // peach
      { oklch: 'oklch(94.9% 0.0121 248.1)', hex: '#E8EFF6' }, // powder blue
      { oklch: 'oklch(95.7% 0.0174 96.2)',  hex: '#F4F1E4' }, // butter
      { oklch: 'oklch(94.9% 0.0086 16.8)',  hex: '#F4ECEC' }, // blush
      { oklch: 'oklch(95.3% 0.0153 171.4)', hex: '#E6F3EE' }, // mint
      { oklch: 'oklch(93.8% 0.0137 277.0)', hex: '#E8EAF4' }, // periwinkle
      { oklch: 'oklch(94.8% 0.0188 83.1)',  hex: '#F4EDE0' }, // warm sand
      { oklch: 'oklch(95.5% 0.0089 180.1)', hex: '#EAF2F0' }, // seafoam
      { oklch: 'oklch(94.3% 0.0001 263.3)', hex: '#ECECEC' }, // cool slate
    ];
    const pick = palettes[Math.floor(Math.random() * palettes.length)];
    document.documentElement.style.setProperty('--bg', pick.oklch);
    document.querySelector('meta[name="theme-color"]').content = pick.hex;
  </script>
  <style>
    /* ── Cascade layers ── */
    @layer reset, tokens, base, components, states, utilities;

    /* ── Animatable custom property registrations ── */
    @property --accent-l {
      syntax: '<number>';
      inherits: true;
      initial-value: 60;
    }
    @property --dot-scale {
      syntax: '<number>';
      inherits: false;
      initial-value: 1;
    }
    @property --row-accent-scale {
      syntax: '<number>';
      inherits: false;
      initial-value: 0;
    }

    @layer reset {
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    }

    @layer tokens {
      :root {
        /* ── Background (overridden by palette JS before first paint) ── */
        --bg:            oklch(96.7% 0.0053 95.3);

        /* ── Surfaces & borders ── */
        --surface:       oklch(100% 0 0 / 0.68);
        --border:        oklch(91.2% 0.0081 99.0);
        --border-mid:    oklch(84.1% 0.0096 100.1);

        /* ── Foreground scale ── */
        --fg:            oklch(21.4% 0.0041 84.6);
        --fg-2:          oklch(46.4% 0.0064 95.3);
        --fg-3:          oklch(68.2% 0.0087 99.1);

        /* ── Accent — teal ── */
        --accent:        oklch(60.0% 0.1039 184.7);
        --accent-dark:   oklch(51.1% 0.0861 186.4);
        --accent-faint:  oklch(98.4% 0.0139 186.3);

        /* ── Semantic: warning ── */
        --warn-bg:       oklch(98.7% 0.0262 102.3);
        --warn-border:   oklch(90.5% 0.1656 98.1);
        --warn-text:     oklch(47.6% 0.1033 61.9);

        /* ── Semantic: error ── */
        --error:         oklch(57.7% 0.2151 27.3);

        /* ── Typography ── */
        --mono: 'IBM Plex Mono', 'Courier New', monospace;
        --sans: 'Inter', system-ui, sans-serif;

        /* ── Type scale (rem) ── */
        --text-2xs: 0.6875rem;   /* 11px */
        --text-xs:  0.75rem;     /* 12px */
        --text-sm:  0.8125rem;   /* 13px */
        --text-md:  0.875rem;    /* 14px */
        --text-lg:  1.125rem;
        --text-xl:  1.25rem;
        --text-2xl: 1.75rem;

        /* ── Line-height tokens ── */
        --leading-tight:  1.2;
        --leading-normal: 1.6;
        --leading-mono:   1.8;

        /* ── Letter-spacing tokens ── */
        --tracking-tight: -0.04em;
        --tracking-wide:  0.08em;
        --tracking-wider: 0.1em;

        /* ── Spacing scale ── */
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.25rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --space-10: 2.5rem;
        --space-12: 3rem;
        --space-16: 4rem;

        /* ── Radii ── */
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 10px;

        /* ── Shadows ── */
        --shadow-focus: 0 0 0 3px color-mix(in oklch, var(--accent) 15%, transparent);
      }

    }

    @layer base {
      html { height: 100%; }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--sans);
        font-size: var(--text-md);
        line-height: var(--leading-normal);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background 0.4s ease;
      }

      h1 {
        font-size: clamp(var(--text-2xl), 5vw, 2.25rem);
        font-weight: 600;
        letter-spacing: var(--tracking-tight);
        line-height: var(--leading-tight);
        margin-bottom: var(--space-2);
      }
    }

    /* ── Keyframes ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-3px); }
      80%       { transform: translateX(3px); }
    }

    @keyframes dot-breathe {
      0%, 100% { --dot-scale: 1; }
      50%       { --dot-scale: 1.35; }
    }

    @layer components {

      /* ── Page container (container query host) ── */
      .page {
        container-type: inline-size;
        container-name: page;
        width: 100%;
        max-width: 540px;
      }

      /* ── Header ── */
      .site-header {
        padding-inline: var(--space-8);
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .wordmark {
        view-transition-name: wordmark;
        font-family: var(--mono);
        font-size: var(--text-md);
        font-weight: 500;
        color: var(--fg);
        letter-spacing: -0.3px;
        transition: opacity 0.2s;
        cursor: default;

        span { color: var(--accent); }

        &:hover { opacity: 0.6; }
      }

      .tagline {
        font-size: var(--text-xs);
        color: var(--fg-3);
        font-weight: 400;
      }

      /* ── Main layout ── */
      main {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: var(--space-16) var(--space-5) var(--space-12);
      }

      /* ── Eyebrow ── */
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: var(--mono);
        font-size: var(--text-2xs);
        font-weight: 500;
        color: var(--accent);
        letter-spacing: var(--tracking-wide);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .eyebrow-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
        scale: var(--dot-scale);
        animation: dot-breathe 2.8s ease-in-out infinite;
        transition: scale 0.2s;
      }

      .subtitle {
        font-size: var(--text-md);
        color: var(--fg-2);
        font-weight: 400;
        line-height: var(--leading-normal);
        margin-bottom: var(--space-7, 1.75rem);
      }

      /* ── Field label ── */
      .field-label {
        display: block;
        font-size: var(--text-2xs);
        font-weight: 600;
        letter-spacing: var(--tracking-wide);
        text-transform: uppercase;
        color: var(--fg-3);
        margin-bottom: var(--space-2);
      }

      /* ── Textarea + parent :has() lift ── */
      .field-wrap {
        position: relative;

        &:has(textarea:focus) {
          .field-label { color: var(--accent); }
        }
      }

      textarea {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border-mid);
        border-radius: var(--radius-md);
        color: var(--fg);
        font-family: var(--mono);
        font-size: var(--text-sm);
        line-height: var(--leading-mono);
        padding: 14px 16px;
        resize: none;
        min-height: 148px;
        outline: none;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;

        &::placeholder { color: var(--fg-3); }

        &:focus {
          border-color: var(--accent);
          box-shadow: var(--shadow-focus);
          background: color-mix(in oklch, var(--surface) 85%, oklch(100% 0 0));
        }
      }

      .field-hint {
        font-size: var(--text-2xs);
        color: var(--fg-3);
        margin-top: var(--space-1);
      }

      /* ── Error message with @starting-style slide ── */
      .error {
        font-size: var(--text-xs);
        color: var(--error);
        margin-top: var(--space-2);
        display: none;
        overflow: hidden;
        transition:
          opacity 0.22s ease,
          transform 0.22s ease,
          display 0.22s ease allow-discrete;

        &.shake { animation: shake 0.35s ease; }
      }

      @starting-style {
        .error[style*="display: block"],
        .error[style*="display:block"] {
          opacity: 0;
          transform: translateY(-6px);
        }
      }

      /* ── Buttons ── */
      .btn-row {
        display: flex;
        gap: var(--space-2);
        flex-wrap: wrap;
        align-items: center;
        margin-top: 14px;
      }

      button {
        view-transition-name: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--accent);
        border: 1px solid var(--accent);
        border-radius: var(--radius-md);
        color: oklch(100% 0 0);
        font-family: var(--sans);
        font-size: var(--text-sm);
        font-weight: 500;
        padding: 10px 18px;
        cursor: pointer;
        letter-spacing: 0.01em;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.15s ease,
          opacity 0.15s ease;

        &:hover {
          background: var(--accent-dark);
          border-color: var(--accent-dark);
        }

        &:active {
          transform: scale(0.94);
          transition-duration: 0.08s;
        }

        &:focus-visible {
          outline: 2px solid var(--accent);
          outline-offset: 3px;
        }

        &.outline {
          background: transparent;
          border-color: var(--border-mid);
          color: var(--fg-2);

          &:hover {
            background: var(--surface);
            border-color: var(--fg-3);
            color: var(--fg);
          }
        }

        &.full {
          width: 100%;
          justify-content: center;
          padding: 13px 18px;
          font-size: var(--text-md);
          font-weight: 600;
          margin-top: var(--space-5);
        }
      }

      #copied {
        font-size: var(--text-xs);
        color: var(--accent);
        font-weight: 500;
        display: none;
      }

      /* ── Output box — @starting-style reveal ── */
      .output {
        margin-top: var(--space-5);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface);
        overflow: hidden;
        display: none;
        transition:
          opacity 0.28s ease,
          transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
          display 0.28s ease allow-discrete;

        &-header {
          padding: 10px 14px;
          border-bottom: 1px solid var(--border);
          font-size: var(--text-2xs);
          font-weight: 600;
          letter-spacing: var(--tracking-wide);
          text-transform: uppercase;
          color: var(--fg-3);
          background: var(--bg);
          display: flex;
          align-items: center;
          gap: 6px;

          &::before {
            content: '';
            display: block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
          }
        }

        &-actions {
          padding: 10px 14px;
          border-top: 1px solid var(--border);
          background: var(--bg);
          display: flex;
          align-items: center;
          gap: 10px;
        }
      }

      @starting-style {
        .output[style*="display: block"],
        .output[style*="display:block"] {
          opacity: 0;
          transform: translateY(-8px) scale(0.98);
        }
      }

      .share-url-wrap { padding: 14px 16px; }

      .share-url {
        font-family: var(--mono);
        font-size: var(--text-xs);
        word-break: break-all;
        color: var(--fg);
        line-height: var(--leading-mono);
      }

      /* ── Recipient UI ── */
      .bundle-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: var(--space-7, 1.75rem);
      }

      .bundle-count {
        font-family: var(--mono);
        font-size: var(--text-xs);
        font-weight: 500;
        color: var(--accent);
        background: var(--accent-faint);
        border: 1px solid color-mix(in oklch, var(--accent) 20%, transparent);
        border-radius: var(--radius-sm);
        padding: 4px 10px;
      }

      .bundle-label {
        font-size: var(--text-xs);
        color: var(--fg-3);
      }

      /* ── URL list ── */
      .url-list {
        list-style: none;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        background: var(--surface);
        margin-bottom: var(--space-1);

        li {
          display: flex;
          align-items: flex-start;
          border-bottom: 1px solid var(--border);
          position: relative;
          transition: background 0.15s ease;

          &:last-child { border-bottom: none; }

          /* Accent reveal bar pseudo-element */
          &::before {
            content: '';
            position: absolute;
            inset-block: 0;
            inset-inline-start: 0;
            width: 3px;
            background: var(--accent);
            transform: scaleY(0);
            transform-origin: center;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 0 2px 2px 0;
          }

          &:hover {
            background: color-mix(in oklch, var(--accent) 4%, var(--surface));

            &::before { transform: scaleY(1); }
          }
        }
      }

      .url-index {
        font-family: var(--mono);
        font-size: var(--text-2xs);
        color: var(--fg-3);
        padding: 12px 14px;
        border-right: 1px solid var(--border);
        background: var(--bg);
        min-width: 42px;
        text-align: center;
        flex-shrink: 0;
        line-height: var(--leading-normal);
      }

      .url-text {
        font-family: var(--mono);
        font-size: var(--text-xs);
        color: var(--fg-2);
        word-break: break-all;
        line-height: 1.7;
        padding: 12px 14px;
      }

      /* ── Popup warning — @starting-style reveal ── */
      .popup-warn {
        display: none;
        margin-top: 12px;
        padding: 12px 14px;
        background: var(--warn-bg);
        border: 1px solid var(--warn-border);
        border-radius: var(--radius-md);
        font-size: var(--text-xs);
        color: var(--warn-text);
        line-height: var(--leading-normal);
        transition:
          opacity 0.22s ease,
          transform 0.22s ease,
          display 0.22s ease allow-discrete;
      }

      @starting-style {
        .popup-warn[style*="display: block"],
        .popup-warn[style*="display:block"] {
          opacity: 0;
          transform: translateY(-6px);
        }
      }

      /* ── Divider ── */
      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin-block: var(--space-7, 1.75rem);
      }

      /* ── Footer ── */
      .site-footer {
        padding-inline: var(--space-8);
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .footer-note {
        font-size: var(--text-2xs);
        color: var(--fg-3);
        font-family: var(--mono);
      }

      .coffee-link {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: var(--text-2xs);
        color: var(--fg-3);
        text-decoration: underline;
        text-underline-offset: 3px;
        font-family: var(--mono);
        transition: color 0.2s ease, transform 0.2s ease;
        padding-block: var(--space-1);

        &:hover {
          color: var(--fg-2);
          transform: translateY(-1px);

          .coffee-icon {
            transform: translateZ(0) rotate(-15deg) scale(1.1);
          }
        }
      }

      .coffee-icon {
        display: inline-block;
        transition: transform 0.3s ease;
        transform: translateZ(0);
        will-change: transform;
      }
    }

    /* ── Container query: compact layout ── */
    @container page (max-width: 400px) {
      h1 { font-size: var(--text-xl); }
      .subtitle { font-size: var(--text-sm); }
      button.full { padding: 11px 14px; }
    }

    /* ── Viewport breakpoint: small screens ── */
    @media (max-width: 480px) {
      .site-header,
      .site-footer { padding-inline: var(--space-4); }
      .tagline { display: none; }
      main { padding-inline: var(--space-4); }
    }

    /* ── Accessibility: focus-visible ring ── */
    @layer utilities {
      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      /* Reduced motion: kill all animations and transitions */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .eyebrow-dot { animation: none; }
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <span class="wordmark">link<span>in</span></span>
    <span class="tagline">one link. all the tabs.</span>
  </header>

  <main>
    <div class="page" id="app"></div>
  </main>

  <footer class="site-footer">
    <span class="footer-note">no account. no tracking. not even a server.</span>
    <a class="coffee-link" href="https://buymeacoffee.com/andermiah" target="_blank" rel="noopener noreferrer">
      <svg class="coffee-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
        <line x1="6" x2="6" y1="2" y2="4"/>
        <line x1="10" x2="10" y1="2" y2="4"/>
        <line x1="14" x2="14" y1="2" y2="4"/>
      </svg>
      buy me a coffee
    </a>
  </footer>

  <script>
    const app = document.getElementById('app');
    const hash = window.location.hash.slice(1);

    function isValidUrl(str) {
      try {
        const u = new URL(str);
        return u.protocol === 'https:';
      } catch { return false; }
    }

    if (hash) {
      // ── Recipient view ──
      let urls = [];
      try { urls = JSON.parse(atob(hash)); } catch {}
      urls = urls.filter(isValidUrl);

      app.innerHTML = `
        <div class="eyebrow">
          <div class="eyebrow-dot"></div>
          Bundle received
        </div>
        <h1>You've got ${urls.length} tab${urls.length !== 1 ? 's' : ''} waiting</h1>
        <p class="subtitle">
          Review the links below before opening. One click opens all of them.
        </p>
        <div class="bundle-meta">
          <span class="bundle-count">${urls.length} link${urls.length !== 1 ? 's' : ''}</span>
          <span class="bundle-label">in this bundle</span>
        </div>
        <ul class="url-list">
          ${urls.map((u, i) => `
            <li>
              <span class="url-index">${String(i + 1).padStart(2, '0')}</span>
              <span class="url-text">${u}</span>
            </li>
          `).join('')}
        </ul>
        <button class="full" onclick="openTabs()">
          Open all ${urls.length} tab${urls.length !== 1 ? 's' : ''} &rarr;
        </button>
        <div class="popup-warn" id="popup-warn">
          Your browser blocked the popups. Click the icon in your address bar, allow popups for this site, then click the button again.
        </div>
      `;

      window.openTabs = () => {
        const btn = event.currentTarget;
        btn.textContent = 'Opening…';
        btn.style.opacity = '0.7';
        const blocked = urls.map(u => window.open(u, '_blank')).some(w => !w);
        setTimeout(() => {
          btn.textContent = `Open all ${urls.length} tab${urls.length !== 1 ? 's' : ''} →`;
          btn.style.opacity = '';
        }, 1200);
        if (blocked) document.getElementById('popup-warn').style.display = 'block';
      };

    } else {
      // ── Creator view ──
      app.innerHTML = `
        <div class="eyebrow">
          <div class="eyebrow-dot"></div>
          Create a bundle
        </div>
        <h1>Bundle your links.<br>Share one URL.</h1>
        <p class="subtitle">
          Paste your URLs below and get a single shareable link.
          Anyone who opens it can launch all the tabs at once.
        </p>
        <div class="field-wrap">
          <label class="field-label" for="urlInput">Your URLs — one per line</label>
          <textarea
            id="urlInput"
            placeholder="https://example.com&#10;https://another.com&#10;https://onemore.com"
            spellcheck="false"
          ></textarea>
        </div>
        <p class="field-hint">Only https:// links are accepted.</p>
        <div class="error" id="err">No valid URLs found. Make sure each line starts with https://</div>
        <div class="btn-row">
          <button onclick="generate()">Generate share link</button>
        </div>
        <div class="output" id="shareOutput">
          <div class="output-header">Your share link</div>
          <div class="share-url-wrap">
            <div class="share-url" id="shareUrl"></div>
          </div>
          <div class="output-actions">
            <button class="outline" onclick="copyUrl()">Copy link</button>
            <span id="copied">Copied</span>
          </div>
        </div>
      `;

      window.generate = () => {
        const urls = document.getElementById('urlInput').value
          .split('\n').map(u => u.trim()).filter(isValidUrl);
        const err = document.getElementById('err');
        if (urls.length === 0) {
          err.style.display = 'block';
          err.classList.remove('shake');
          void err.offsetWidth; // force reflow to restart animation
          err.classList.add('shake');
          return;
        }
        err.style.display = 'none';
        const encoded = btoa(JSON.stringify(urls));
        const shareUrl = `${location.origin}${location.pathname}#${encoded}`;
        document.getElementById('shareUrl').textContent = shareUrl;
        const out = document.getElementById('shareOutput');
        out.style.display = 'block';
        const btn = event.currentTarget;
        const orig = btn.textContent;
        btn.textContent = '✓ Link ready';
        setTimeout(() => btn.textContent = orig, 1800);
      };

      window.copyUrl = () => {
        navigator.clipboard.writeText(document.getElementById('shareUrl').textContent);
        const btn = event.currentTarget;
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        btn.style.color = 'var(--accent)';
        btn.style.borderColor = 'var(--accent)';
        setTimeout(() => {
          btn.textContent = orig;
          btn.style.color = '';
          btn.style.borderColor = '';
        }, 1800);
      };
    }
  </script>
</body>
</html>
