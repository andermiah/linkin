<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="1200" height="630" fill="#060606"/>
  <!-- acid green blobs -->
  <circle cx="1100" cy="-80"  r="420" fill="#C6FF4E" opacity="0.10"/>
  <circle cx="-80"  cy="700" r="360" fill="#C6FF4E" opacity="0.07"/>
  <circle cx="600"  cy="700" r="280" fill="#4466CC" opacity="0.08"/>
  <circle cx="1050" cy="580" r="220" fill="#C6FF4E" opacity="0.05"/>
  <!-- label row -->
  <rect x="80" y="176" width="28" height="2" fill="#C6FF4E"/>
  <text x="118" y="178" dominant-baseline="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#C6FF4E" letter-spacing="5">LINK BUNDLER</text>
  <!-- big headline -->
  <text x="72" y="388" font-family="-apple-system, BlinkMacSystemFont, 'Arial Black', 'Helvetica Neue', sans-serif" font-size="200" font-weight="900" fill="#F0EEE8" letter-spacing="-6">LINKIN</text>
  <!-- tagline -->
  <text x="80" y="456" font-family="'Courier New', Courier, monospace" font-size="28" fill="rgba(240,238,232,0.55)">one link. all the tabs.</text>
  <!-- feature pills -->
  <rect x="80"  y="490" width="148" height="34" rx="17" fill="#C6FF4E" opacity="0.15"/>
  <rect x="244" y="490" width="168" height="34" rx="17" fill="#C6FF4E" opacity="0.15"/>
  <rect x="428" y="490" width="152" height="34" rx="17" fill="#C6FF4E" opacity="0.15"/>
  <text x="154" y="513" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" fill="#C6FF4E">bundle URLs</text>
  <text x="328" y="513" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" fill="#C6FF4E">share one link</text>
  <text x="504" y="513" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" fill="#C6FF4E">open all tabs</text>
  <!-- url -->
  <text x="80" y="590" font-family="'Courier New', Courier, monospace" font-size="20" fill="rgba(240,238,232,0.25)">andermiah.github.io/linkin</text>
</svg>
